<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="32" fill="rgba(255,255,255,0.9)" clip-path="url(#circle)"/>
  <!-- Body -->
  <ellipse cx="100" cy="165" rx="55" ry="45" fill="rgba(255,255,255,0.9)" clip-path="url(#circle)"/>
  <!-- Initials fallback text -->
  <text x="100" y="90" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" fill="#6366f1" text-anchor="middle" dominant-baseline="middle">SB</text>
</svg>
